<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right, #b30000, #ff4d4d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    width:360px;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* COLLEGE LOGO */
.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:10px;
}

h1{
    font-size:18px;
    color:#b30000;
    margin:5px 0;
    font-weight:bold;
}

p{
    font-size:13px;
    color:gray;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}

.footer{
    margin-top:10px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div class="login-box">

    <!-- ✅ COLLEGE LOGO ADDED HERE -->
    <img src="/mnt/data/file_00000000df4871fbae9859b7cc4ed844" 
         alt="Adhiparasakthi Engineering College Logo" 
         class="logo">

    <!-- COLLEGE NAME -->
    <h1>Adhiparasakthi Engineering College</h1>
    <p>Student Login Portal</p>

    <!-- LOGIN FORM -->
    <form>
        <input type="text" placeholder="User ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Study • Spirituality • Service
    </div>

</div>

</body>
</html>
