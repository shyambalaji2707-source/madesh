<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login Page</title>

<style>
    body{
        margin:0;
        padding:0;
        font-family:Arial, sans-serif;
        background:linear-gradient(to right,#141e30,#243b55);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .login-box{
        background:white;
        width:350px;
        padding:25px;
        border-radius:12px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .login-box img{
        width:100px;
        margin-bottom:10px;
    }

    .college-name{
        font-size:16px;
        font-weight:bold;
        color:#243b55;
        margin-bottom:15px;
        line-height:1.4;
    }

    h2{
        margin-bottom:20px;
        color:#141e30;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
    }

    button{
        width:100%;
        padding:12px;
        background:#243b55;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#141e30;
    }

    .footer{
        margin-top:15px;
        font-size:12px;
        color:gray;
    }
</style>

</head>

<body>

<div class="login-box">

    <!-- FIXED LOGO PATH -->
    <img src="1697346843915.jpg" alt="College Logo">

    <div class="college-name">
        ADHIPARASAKTHI ENGINEERING COLLEGE<br>
        MELMARUVATHUR
    </div>

    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="User ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2026 College Login Portal
    </div>

</div>

</body>
</html>
